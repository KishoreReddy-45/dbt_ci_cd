name: dbt Deployment

on:
  push:
    branches:
      - main

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dbt
        run: |
          pip install dbt-duckdb

      - name: Run dbt seed
        run: dbt seed

      - name: Run dbt models
        run: dbt run

      - name: Run dbt tests
        run: dbt test