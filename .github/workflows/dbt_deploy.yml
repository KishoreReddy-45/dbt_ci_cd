name: dbt Deployment

on:
  push:
    branches:
      - dev
      - staging
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Print Branch
        run: echo "Deploying branch $GITHUB_REF"

      - name: Set Environment Target
        run: |
          if [[ $GITHUB_REF == "refs/heads/dev" ]]; then
            echo "DBT_TARGET=dev" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == "refs/heads/staging" ]]; then
            echo "DBT_TARGET=staging" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == "refs/heads/prod" ]]; then
            echo "DBT_TARGET=prod" >> $GITHUB_ENV
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dbt
        run: pip install dbt-duckdb

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "dbt_local_project:
            target: $DBT_TARGET
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
              staging:
                type: duckdb
                path: staging.duckdb
              prod:
                type: duckdb
                path: prod.duckdb" > ~/.dbt/profiles.yml

      - name: Run dbt debug
        run: dbt debug

      - name: Run dbt build
        run: dbt build

      - name: Deployment Completed
        run: echo "Deployment completed for $DBT_TARGET"