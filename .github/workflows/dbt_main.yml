name: dbt Main Deployment

on:
  push:
    branches:
      - main

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dbt
        run: pip install dbt-duckdb

      - name: Create dbt profiles.yml
        run: |
          mkdir -p /home/runner/.dbt
          echo "dbt_local_project:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb" > /home/runner/.dbt/profiles.yml

      - name: Run dbt debug
        run: dbt debug

      - name: Run dbt seed
        run: dbt seed

      - name: Run dbt run
        run: dbt run